name: Update SEO Static Pages

on:
  push:
    paths:
      - 'src/data/products.js'
      - 'scripts/generateStaticPages.js'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-seo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Generate SEO static pages
      run: node scripts/generateStaticPages.js
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/ vercel.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: auto-update SEO static pages [skip ci]"
          git push
        fi